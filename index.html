<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEZO | Premium Universe</title>
    <style>
        :root { --accent: #00f2ff; --red: #ff0055; --bg: #050505; --card: #111; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 50px; overflow-x: hidden; }

        /* --- HAVALI INTRO --- */
        #intro { position: fixed; inset: 0; background: #000; z-index: 5000; display: flex; align-items: center; justify-content: center; transition: 1s; }
        .intro-text { font-size: 60px; font-weight: 900; color: var(--red); text-shadow: 0 0 20px var(--red); animation: zoom 2s ease-in-out; }
        @keyframes zoom { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1.1); opacity: 1; } }
        .hide { opacity: 0; visibility: hidden; }

        /* --- MOBİL UYUMLU NAVBAR & ARAMA --- */
        .nav { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); position: fixed; top: 0; width: 100%; z-index: 1000; box-sizing: border-box; border-bottom: 1px solid rgba(0,242,255,0.2); }
        .logo { font-size: 24px; font-weight: bold; color: var(--red); text-shadow: 0 0 10px var(--red); text-decoration: none; }

        .nav-right { display: flex; align-items: center; gap: 15px; }
        .search-icon-btn { background: none; border: none; color: white; font-size: 18px; cursor: pointer; padding: 5px; }
        .search-icon-btn:hover { color: var(--accent); }

        /* Gizli Mobil Arama Paneli */
        #search-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 60px; background: rgba(0,0,0,0.95); z-index: 1001; display: none; align-items: center; padding: 0 15px; box-sizing: border-box; border-bottom: 2px solid var(--accent); }
        #search-overlay input { flex-grow: 1; background: #1a1a1a; border: none; color: white; padding: 10px; border-radius: 5px; font-size: 16px; outline: none; margin-right: 10px; }
        #search-overlay input:focus { border: 1px solid var(--accent); }
        .close-search { background: none; border: none; color: white; font-size: 16px; cursor: pointer; }

        .wrapper { margin-top: 70px; padding: 0 15px; }

        /* --- OYNATICI VE SEÇİCİ --- */
        #player-panel { display: none; background: var(--card); border-radius: 12px; padding: 10px; border: 1px solid rgba(0,242,255,0.1); margin-bottom: 20px; animation: slideDown 0.5s; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        video { width: 100%; border-radius: 8px; background: #000; box-shadow: 0 0 15px rgba(0,0,0,0.3); }
        
        .selector { margin-top: 15px; background: rgba(255,255,255,0.03); padding: 10px; border-radius: 8px; }
        .tabs { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; margin-bottom: 10px; }
        .tabs::-webkit-scrollbar { height: 3px; }
        .tabs::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }
        .tab-btn { background: #222; border: 1px solid #333; color: white; padding: 8px 12px; border-radius: 4px; font-size: 12px; white-space: nowrap; cursor: pointer; transition: 0.3s; }
        .tab-btn.active { background: var(--accent); color: black; font-weight: bold; border-color: var(--accent); }
        
        .ep-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
        @media (min-width: 400px) { .ep-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width: 600px) { .ep-grid { grid-template-columns: repeat(4, 1fr); } }
        .ep-btn { background: #333; border: none; color: white; padding: 10px; border-radius: 4px; font-size: 12px; cursor: pointer; transition: 0.2s; }
        .ep-btn:hover, .ep-btn.active { background: var(--red); transform: scale(1.03); }

        /* --- KATALOG VE AFİŞLER --- */
        .shelf-title { font-size: 18px; margin: 20px 0 12px; letter-spacing: 1px; border-left: 3px solid var(--red); padding-left: 8px; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(4, 1fr); } }

        .card { background: var(--card); border-radius: 10px; overflow: hidden; position: relative; cursor: pointer; transition: 0.3s; border: 1px solid #222; }
        .card:hover { transform: translateY(-3px); border-color: var(--accent); box-shadow: 0 5px 15px rgba(0, 242, 255, 0.1); }
        .card img { width: 100%; height: 230px; object-fit: cover; }
        .card-info { position: absolute; inset: 0; background: linear-gradient(transparent, rgba(0,0,0,0.8)); display: flex; flex-direction: column; justify-content: flex-end; padding: 10px; opacity: 0; transition: 0.3s; }
        .card:hover .card-info { opacity: 1; }
        .play-ico { width: 30px; height: 30px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: black; font-size: 14px; font-weight: bold; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div id="intro"><div class="intro-text">NEZO</div></div>

    <div id="search-overlay">
        <input type="text" id="searchInput" placeholder="Dizi, film ara..." onkeyup="search()">
        <button class="close-search" onclick="toggleSearch()">( X ) Kapat</button>
    </div>

    <nav class="nav">
        <a href="#" class="logo">NEZO</a>
        <div class="nav-right">
            <div style="font-size: 10px; color: var(--accent); border: 1px solid var(--accent); padding: 2px 6px; border-radius: 4px;">KUSURSUZ</div>
            <button class="search-icon-btn" onclick="toggleSearch()">🔍</button>
        </div>
    </nav>

    <div class="wrapper">
        <div id="player-panel">
            <h2 id="p-title" style="margin: 0 0 10px 0; color: var(--accent); font-size: 16px;">Oynatılıyor</h2>
            <video id="mainPlayer" controls poster="https://i.ibb.co/6P2CkzN/loading.gif"><source src="" type="video/mp4"></video>
            
            <div class="selector">
                <div id="s-tabs" class="tabs"></div>
                <div id="e-grid" class="ep-grid"></div>
            </div>
        </div>

        <div class="shelf-title">Trend Yayınlar</div>
        <div class="grid" id="main-grid"></div>

        <div class="shelf-title">Karanlık Oda (Korku)</div>
        <div class="grid" id="horror-grid"></div>
    </div>

    <script>
        // TÜM BÖLÜM VE SEZON VERİLERİ (BLEACH GÜNCELLENDİ)
        const database = [
            { id: 'bl', cat: 'pop', t: 'Bleach', img: 'https://image.tmdb.org/t/p/w600_and_h900_bestv2/367Tf0G5XJvV8M2K2M6fK6fG6fG.jpg', seasons: [20, 21, 22, 28, 21, 22, 20, 16, 21, 16, 20, 20, 26, 20, 26, 24] },
            { id: 'pb', cat: 'pop', t: 'Prison Break', img: 'https://image.tmdb.org/t/p/w600_and_h900_bestv2/u9Y6G5f9B5T7H0o8Xo0lY7oX6nS.jpg', seasons: [22, 22, 22, 24, 9] },
            { id: 'bb', cat: 'pop', t: 'Breaking Bad', img: 'https://image.tmdb.org/t/p/w600_and_h900_bestv2/ztY5UiswzG8uVjP4uKk3UjA0fF1.jpg', seasons: [7, 13, 13, 13, 16] },
            { id: 'cj', cat: 'hor', t: 'The Conjuring', img: 'https://image.tmdb.org/t/p/w600_and_h900_bestv2/wS4kH5G0VzD6iE1T9U0p6S5mF7G.jpg', seasons: [1] },
            { id: 'it', cat: 'hor', t: 'O (IT)', img: 'https://image.tmdb.org/t/p/w600_and_h900_bestv2/9E2D8hM52O2Z7r1t9H1E7k2N4p9.jpg', seasons: [1] }
        ];

        function init() {
            renderShelf(database.filter(x => x.cat === 'pop'), 'main-grid');
            renderShelf(database.filter(x => x.cat === 'hor'), 'horror-grid');
            setTimeout(() => document.getElementById('intro').classList.add('hide'), 2000);
        }

        function renderShelf(data, targetId) {
            const shelf = document.getElementById(targetId);
            data.forEach(m => {
                shelf.innerHTML += `
                    <div class="card" onclick="openMedia('${m.id}')" data-name="${m.t.toLowerCase()}">
                        <img src="${m.img}" onerror="this.src='https://via.placeholder.com/300x450/050505/00f2ff?text=${m.t}'">
                        <div class="card-info">
                            <div class="play-ico">N</div>
                            <div style="font-weight:bold; font-size:12px;">${m.t}</div>
                        </div>
                    </div>
                `;
            });
        }

        // ARAMA PANELİNİ AÇMA/KAPAMA
        function toggleSearch() {
            const overlay = document.getElementById('search-overlay');
            const input = document.getElementById('searchInput');
            if(overlay.style.display === 'flex') {
                overlay.style.display = 'none';
                input.value = '';
                search(); // Aramayı sıfırla
            } else {
                overlay.style.display = 'flex';
                input.focus();
            }
        }

        function search() {
            const val = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.card').forEach(c => {
                const name = c.dataset.name;
                c.style.display = name.includes(val) ? "block" : "none";
            });
        }

        function openMedia(id) {
            const item = database.find(x => x.id === id);
            const panel = document.getElementById('player-panel');
            panel.style.display = 'block';
            document.getElementById('p-title').innerText = item.t;
            
            const sTabs = document.getElementById('s-tabs');
            sTabs.innerHTML = '';
            item.seasons.forEach((c, i) => {
                sTabs.innerHTML += `<button class="tab-btn" onclick="loadEpisodes('${item.id}', ${i})">Sezon ${i+1}</button>`;
            });
            loadEpisodes(id, 0); // Varsayılan: Sezon 1
            window.scrollTo({top: 80, behavior: 'smooth'});
        }

        function loadEpisodes(id, sIdx) {
            // Aktif buton rengini değiştir
            document.querySelectorAll('.tab-btn').forEach((b, idx) => {
                if(idx === sIdx) b.classList.add('active'); else b.classList.remove('active');
            });

            const item = database.find(x => x.id === id);
            const epGrid = document.getElementById('e-grid');
            epGrid.innerHTML = '';
            
            const epCount = item.seasons[sIdx];
            for(let i=1; i<=epCount; i++) {
                epGrid.innerHTML += `<button class="ep-btn" onclick="play('${item.t}', ${sIdx+1}, ${i})">Bölüm ${i}</button>`;
            }
        }

        function play(title, s, e) {
            // Aktif bölümü seçili yap
            document.querySelectorAll('.ep-btn').forEach(b => {
                if(b.innerText === `Bölüm ${e}`) b.classList.add('active'); else b.classList.remove('active');
            });

            const player = document.getElementById('mainPlayer');
            document.getElementById('p-title').innerText = `${title} - Sezon ${s} Bölüm ${e}`;
            
            /* VİDEO LİNKİNİ BURADA GÜNCELLEYECEKSİN:
               v.src = "https://senananyanj-prog.github.io/video/" + title.toLowerCase() + "_s" + s + "_e" + e + ".mp4";
            */
            // Şimdilik test videosu:
            player.src = "https://www.w3schools.com/html/mov_bbb.mp4"; 
            player.play();
        }

        window.onload = init;
    </script>
</body>
</html>
