<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEZO | Digital Universe</title>
    <style>
        :root {
            --accent: #00f2ff; /* Neon Mavi */
            --main-red: #ff0055; /* Canlı Pembe-Kırmızı */
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            background: radial-gradient(circle at center, #111 0%, #050505 100%);
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* --- ÖZGÜN NEZO INTRO --- */
        #nezo-intro {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; align-items: center; justify-content: center;
            z-index: 2000; transition: 1s ease-in-out;
        }
        .ring {
            width: 150px; height: 150px; border: 3px solid transparent;
            border-top: 3px solid var(--accent); border-radius: 50%;
            animation: spin 1.5s linear infinite;
            position: absolute;
        }
        .intro-text {
            font-size: 50px; font-weight: 900; letter-spacing: 10px;
            background: linear-gradient(45deg, var(--main-red), var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: pulse 2s ease-in-out forwards;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulse {
            0% { transform: scale(0.8); opacity: 0; letter-spacing: 20px; }
            50% { opacity: 1; transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; letter-spacing: 5px; }
        }
        .fade-away { opacity: 0; visibility: hidden; }

        /* --- MODERN NAVBAR --- */
        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 40px; background: var(--glass);
            backdrop-filter: blur(10px); position: fixed; top: 0; width: 100%;
            z-index: 1000; box-sizing: border-box; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .logo-text {
            font-size: 30px; font-weight: bold; background: linear-gradient(to right, var(--main-red), #fff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* --- PLAYER --- */
        .content-wrap { margin-top: 100px; padding: 20px; }
        #player-box { 
            display: none; background: var(--glass); border-radius: 20px;
            padding: 10px; border: 1px solid rgba(0, 242, 255, 0.3);
            margin-bottom: 40px; box-shadow: 0 0 30px rgba(0, 242, 255, 0.1);
        }
        video { width: 100%; border-radius: 15px; }

        /* --- ÖZGÜN KATALOG TASARIMI --- */
        .section-title { 
            font-size: 24px; margin: 30px 0 15px; display: flex; align-items: center;
            text-transform: uppercase; letter-spacing: 2px;
        }
        .section-title::before {
            content: ""; width: 5px; height: 25px; background: var(--accent);
            margin-right: 15px; border-radius: 5px; box-shadow: 0 0 10px var(--accent);
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        
        .nezo-card {
            position: relative; border-radius: 15px; overflow: hidden;
            background: #111; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid transparent;
        }
        .nezo-card:hover {
            transform: translateY(-10px); border-color: var(--accent);
            box-shadow: 0 10px 25px rgba(0, 242, 255, 0.2);
        }
        .nezo-card img { width: 100%; height: 250px; object-fit: cover; transition: 0.5s; }
        .nezo-card:hover img { filter: brightness(0.4) blur(2px); }
        
        .card-info {
            position: absolute; bottom: -50px; left: 0; width: 100%;
            padding: 15px; background: linear-gradient(transparent, #000);
            transition: 0.3s; opacity: 0; box-sizing: border-box;
        }
        .nezo-card:hover .card-info { bottom: 0; opacity: 1; }
        .play-btn {
            background: var(--accent); color: #000; border: none;
            padding: 5px 15px; border-radius: 20px; font-weight: bold; cursor: pointer;
        }

        @media (max-width: 600px) {
            .grid { grid-template-columns: repeat(2, 1fr); }
            .navbar { padding: 15px; }
            .logo-text { font-size: 22px; }
        }
    </style>
</head>
<body>

    <div id="nezo-intro">
        <div class="ring"></div>
        <div class="intro-text">NEZO</div>
    </div>

    <nav class="navbar">
        <div class="logo-text">NEZO</div>
        <div style="font-size: 0.8rem; color: var(--accent);">PREMIUM UNIVERSE</div>
    </nav>

    <div class="content-wrap">
        <div id="player-box">
            <h2 id="p-title" style="margin-top:0; color: var(--accent);"></h2>
            <video id="v-player" controls></video>
        </div>

        <div class="section-title">Trendler</div>
        <div class="grid" id="popular-grid"></div>

        <div class="section-title">Karanlık Oda</div>
        <div class="grid" id="horror-grid"></div>
    </div>

    <script>
        // Film Verileri
        const movies = {
            popular: [
                { t: 'Prison Break', d: 'Kaçış sanatı.', img: 'https://www.themoviedb.org/t/p/w600_and_h900_bestv2/u9Y6G5f9B5T7H0o8Xo0lY7oX6nS.jpg', url: 'https://www.w3schools.com/html/mov_bbb.mp4' },
                { t: 'Bleach', d: 'Ruhların savaşı.', img: 'https://www.themoviedb.org/t/p/w600_and_h900_bestv2/367Tf0G5XJvV8M2K2M6fK6fG6fG.jpg', url: 'https://www.w3schools.com/html/movie.mp4' },
                { t: 'The Witcher', d: 'Canavar avcısı.', img: 'https://www.themoviedb.org/t/p/w600_and_h900_bestv2/7vUveX54CgU1q6Cq74q3G3Fm6F1.jpg', url: '' }
            ],
            horror: [
                { t: 'The Conjuring', d: 'Korku seansı.', img: 'https://www.themoviedb.org/t/p/w600_and_h900_bestv2/wS4kH5G0VzD6iE1T9U0p6S5mF7G.jpg', url: '' },
                { t: 'IT', d: 'O geri döndü.', img: 'https://www.themoviedb.org/t/p/w600_and_h900_bestv2/9E2D8hM52O2Z7r1t9H1E7k2N4p9.jpg', url: '' }
            ]
        };

        // Katalog Oluşturma
        function createGrid(data, containerId) {
            const container = document.getElementById(containerId);
            data.forEach(m => {
                container.innerHTML += `
                    <div class="nezo-card" onclick="startPlay('${m.t}', '${m.url}')">
                        <img src="${m.img}" alt="${m.t}">
                        <div class="card-info">
                            <div style="font-weight:bold; margin-bottom:5px;">${m.t}</div>
                            <button class="play-btn">İzle</button>
                        </div>
                    </div>
                `;
            });
        }

        function startPlay(title, url) {
            if(!url) return alert("Bu içerik yakında eklenecek!");
            document.getElementById('player-box').style.display = 'block';
            document.getElementById('p-title').innerText = title;
            const v = document.getElementById('v-player');
            v.src = url;
            v.play();
            window.scrollTo({top: 80, behavior: 'smooth'});
        }

        // Başlangıç
        window.onload = () => {
            createGrid(movies.popular, 'popular-grid');
            createGrid(movies.horror, 'horror-grid');
            
            setTimeout(() => {
                document.getElementById('nezo-intro').classList.add('fade-away');
            }, 3500);
        };
    </script>
</body>
</html>
