<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEZO | Premium Universe</title>
    <style>
        :root {
            --accent: #00f2ff;
            --secondary: #7000ff;
            --main-red: #ff0055;
            --bg: #020205;
            --card-bg: rgba(255, 255, 255, 0.03);
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(112, 0, 255, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 242, 255, 0.1) 0%, transparent 40%);
            color: white;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* --- HAVALI INTRO --- */
        #nezo-intro {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; align-items: center; justify-content: center; transition: 1.2s cubic-bezier(0.7, 0, 0.3, 1);
        }
        .intro-logo {
            font-size: 80px; font-weight: 900; letter-spacing: 15px;
            background: linear-gradient(to right, var(--main-red), var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(255, 0, 85, 0.5));
            animation: introReveal 2.5s ease-out forwards;
        }
        @keyframes introReveal {
            0% { transform: scale(0.8); opacity: 0; letter-spacing: 40px; filter: blur(20px); }
            50% { opacity: 1; filter: blur(0px); }
            100% { transform: scale(1.1); opacity: 1; letter-spacing: 10px; }
        }

        /* --- MODERN NAVBAR --- */
        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 40px; background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(20px); position: fixed; top: 0; width: 100%;
            z-index: 1000; box-sizing: border-box; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .logo {
            font-size: 28px; font-weight: 900; color: #fff;
            text-shadow: 0 0 15px var(--main-red); cursor: pointer;
        }
        .search-container { position: relative; width: 250px; }
        .search-container input {
            width: 100%; padding: 10px 15px; border-radius: 25px;
            background: rgba(255,255,255,0.05); border: 1px solid var(--accent);
            color: white; outline: none; transition: 0.3s;
        }
        .search-container input:focus { box-shadow: 0 0 15px var(--accent); background: rgba(255,255,255,0.1); }

        /* --- MAIN CONTENT --- */
        .container { margin-top: 100px; padding: 0 40px; }

        /* PLAYER PANEL */
        #player-panel {
            display: none; background: var(--card-bg); border-radius: 24px;
            padding: 20px; border: 1px solid rgba(0, 242, 255, 0.2);
            backdrop-filter: blur(10px); margin-bottom: 50px;
        }
        .video-box { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 15px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .video-box iframe { position: absolute; top:0; left:0; width:100%; height:100%; border:none; }

        /* SEZON & BÖLÜM STİLLERİ */
        .selector-ui { margin-top: 25px; }
        .tab-row { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 15px; }
        .tab-row::-webkit-scrollbar { height: 4px; }
        .tab-row::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
        .s-btn {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: #ccc; padding: 10px 20px; border-radius: 12px; cursor: pointer; transition: 0.3s;
        }
        .s-btn.active, .s-btn:hover { background: var(--accent); color: #000; font-weight: bold; border-color: var(--accent); transform: translateY(-3px); }

        .ep-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; margin-top: 20px; }
        .e-btn {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
            color: white; padding: 12px; border-radius: 8px; cursor: pointer; transition: 0.2s;
        }
        .e-btn:hover { background: var(--main-red); border-color: var(--main-red); }

        /* --- KATALOG TASARIMI --- */
        .shelf-header {
            font-size: 24px; margin: 40px 0 20px; font-weight: 700;
            display: flex; align-items: center; letter-spacing: 1px;
        }
        .shelf-header::before {
            content: ""; width: 8px; height: 30px; background: linear-gradient(var(--secondary), var(--accent));
            margin-right: 15px; border-radius: 4px;
        }

        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 25px; }
        .movie-card {
            position: relative; border-radius: 20px; overflow: hidden;
            background: #111; cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255,255,255,0.05);
        }
        .movie-card:hover { transform: scale(1.05) translateY(-10px); border-color: var(--accent); box-shadow: 0 15px 30px rgba(0, 242, 255, 0.15); }
        .movie-card img { width: 100%; height: 280px; object-fit: cover; }
        .card-info {
            position: absolute; inset: 0; background: linear-gradient(transparent, rgba(0,0,0,0.9));
            display: flex; flex-direction: column; justify-content: flex-end; padding: 15px;
            opacity: 0; transition: 0.3s;
        }
        .movie-card:hover .card-info { opacity: 1; }
        .play-icon { width: 40px; height: 40px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; color: #000; }

        @media (max-width: 768px) {
            .navbar { padding: 15px 20px; }
            .search-container { width: 150px; }
            .container { padding: 0 20px; }
            .movie-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

    <div id="nezo-intro">
        <div class="intro-logo">NEZO</div>
    </div>

    <nav class="navbar">
        <div class="logo" onclick="location.reload()">NEZO</div>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Dizi, film ara..." onkeyup="searchMovies()">
        </div>
    </nav>

    <div class="container">
        <div id="player-panel">
            <h2 id="cur-title" style="margin: 0 0 20px 0; color: var(--accent);"></h2>
            <div class="video-box">
                <iframe id="main-iframe" allowfullscreen></iframe>
            </div>
            
            <div class="selector-ui">
                <div id="s-tabs" class="tab-row"></div>
                <div id="e-grid" class="ep-list"></div>
            </div>
        </div>

        <div class="shelf-header">Trend Yayınlar</div>
        <div id="trend-shelf" class="movie-grid"></div>

        <div class="shelf-header">Karanlık Oda</div>
        <div id="horror-shelf" class="movie-grid"></div>
    </div>

    <script>
        const links = {
            "bl_s2_e1": "https://animecix.tv/titles/82/bleach/season/2/episode/1"
        };

        const db = [
            { id: 'bl', title: 'Bleach', cat: 'trend', img: 'https://www.themoviedb.org/t/p/w600_and_h900_bestv2/367Tf0G5XJvV8M2K2M6fK6fG6fG.jpg', seasons: [20, 21, 22] },
            { id: 'pb', title: 'Prison Break', cat: 'trend', img: 'https://www.themoviedb.org/t/p/w600_and_h900_bestv2/u9Y6G5f9B5T7H0o8Xo0lY7oX6nS.jpg', seasons: [22, 22, 22, 24, 9] },
            { id: 'bb', title: 'Breaking Bad', cat: 'trend', img: 'https://www.themoviedb.org/t/p/w600_and_h900_bestv2/ztY5UiswzG8uVjP4uKk3UjA0fF1.jpg', seasons: [7, 13, 13, 13, 16] },
            { id: 'it', title: 'IT (O)', cat: 'horror', img: 'https://www.themoviedb.org/t/p/w600_and_h900_bestv2/9E2D8hM52O2Z7r1t9H1E7k2N4p9.jpg', seasons: [1] }
        ];

        function init() {
            renderGrid(db);
            setTimeout(() => {
                const intro = document.getElementById('nezo-intro');
                intro.style.transform = "translateY(-100%)";
            }, 2800);
        }

        function renderGrid(data) {
            const trend = document.getElementById('trend-shelf');
            const horror = document.getElementById('horror-shelf');
            trend.innerHTML = ''; horror.innerHTML = '';

            data.forEach(m => {
                const card = `
                    <div class="movie-card" onclick="openPlayer('${m.id}')" data-title="${m.title.toLowerCase()}">
                        <img src="${m.img}" onerror="this.src='https://via.placeholder.com/300x450/050505/00f2ff?text=${m.title}'">
                        <div class="card-info">
                            <div class="play-icon">▶</div>
                            <div style="font-weight:bold">${m.title}</div>
                            <div style="font-size:12px; color:var(--accent)">Premium HD</div>
                        </div>
                    </div>`;
                if(m.cat === 'trend') trend.innerHTML += card;
                else horror.innerHTML += card;
            });
        }

        function searchMovies() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.movie-card').forEach(card => {
                const title = card.getAttribute('data-title');
                card.style.display = title.includes(term) ? "block" : "none";
            });
        }

        function openPlayer(id) {
            const item = db.find(x => x.id === id);
            const panel = document.getElementById('player-panel');
            panel.style.display = 'block';
            document.getElementById('cur-title').innerText = item.title;
            
            const sTabs = document.getElementById('s-tabs');
            sTabs.innerHTML = '';
            item.seasons.forEach((c, i) => {
                sTabs.innerHTML += `<button class="s-btn" onclick="loadEps('${item.id}', ${i})">Sezon ${i+1}</button>`;
            });
            loadEps(id, 0);
            window.scrollTo({top: 100, behavior: 'smooth'});
        }

        function loadEps(id, sIdx) {
            const item = db.find(x => x.id === id);
            const grid = document.getElementById('e-grid');
            grid.innerHTML = '';
            for(let i=1; i<=item.seasons[sIdx]; i++) {
                grid.innerHTML += `<button class="e-btn" onclick="watch('${id}', ${sIdx+1}, ${i})">Bölüm ${i}</button>`;
            }
        }

        function watch(id, s, e) {
            const frame = document.getElementById('main-frame');
            const key = `${id}_s${s}_e${e}`;
            if(links[key]) {
                frame.src = links[key];
            } else {
                alert("Link henüz eklenmedi! Linki bana gönder, hemen ekleyelim.");
                frame.src = "about:blank";
            }
        }

        window.onload = init;
    </script>
</body>
</html>
