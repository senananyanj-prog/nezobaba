<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEZO | Premium Universe</title>
    <style>
        :root {
            --accent: #00f2ff; /* Görseldeki Neon Turkuaz */
            --bg: #020205; /* Koyu Lacivert/Mor Geçişi İçin Temel */
            --card-bg: rgba(255, 255, 255, 0.03);
        }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% 50%, #0a0a1a 0%, #020205 100%);
            color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden;
        }

        /* NAVBAR & MOBİL ARAMA */
        .nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 15px; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(15px);
            position: fixed; top: 0; width: 100%; z-index: 2000; box-sizing: border-box;
            border-bottom: 1px solid var(--accent);
        }
        .logo { font-size: 26px; font-weight: 900; color: #fff; text-shadow: 0 0 15px var(--accent); cursor: pointer; }
        .search-trigger { font-size: 20px; color: white; background: none; border: none; cursor: pointer; }

        #search-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 60px;
            background: rgba(0,0,0,0.95); z-index: 2001; display: none; align-items: center;
            padding: 0 15px; box-sizing: border-box; border-bottom: 2px solid var(--accent);
        }
        #search-overlay input { flex-grow: 1; background: #1a1a1a; border: none; color: white; padding: 10px; border-radius: 5px; outline: none; }

        .wrapper { margin-top: 80px; padding: 15px; }

        /* DEV OYNATICI (PLAYER) */
        #player-panel {
            display: none; background: #000; border-radius: 20px; padding: 10px;
            border: 2px solid var(--accent); margin-bottom: 30px;
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.2); animation: slideIn 0.6s ease;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
        
        .video-box { position: relative; width: 100%; padding-bottom: 56.25%; height: 0; border-radius: 15px; overflow: hidden; background: #000; }
        .video-box iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        /* SEZON & BÖLÜM SEÇİCİ */
        .tabs { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; }
        .tab-btn { background: #222; border: 1px solid var(--accent); color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer; white-space: nowrap; }
        .tab-btn.active { background: var(--accent); color: #000; font-weight: bold; }
        
        .ep-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 10px; margin-top: 15px; max-height: 250px; overflow-y: auto; padding-right: 5px; }
        .ep-btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 12px; border-radius: 6px; cursor: pointer; transition: 0.3s; }
        .ep-btn:hover { background: var(--accent); color: black; font-weight: bold; transform: scale(1.05); }

        /* KATALOG */
        .title { font-size: 22px; margin: 30px 0 15px; border-left: 5px solid var(--accent); padding-left: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        .card { background: #111; border-radius: 15px; overflow: hidden; border: 1px solid #222; cursor: pointer; transition: 0.4s; }
        .card:hover { border-color: var(--accent); transform: translateY(-10px); }
        .card img { width: 100%; height: 240px; object-fit: cover; }
        .card-name { padding: 10px; text-align: center; font-weight: bold; font-size: 14px; color: var(--accent); }
    </style>
</head>
<body>

    <div id="search-overlay">
        <input type="text" id="searchInput" placeholder="Dizi ara..." onkeyup="doSearch()">
        <button onclick="toggleSearch()" style="background:none; border:none; color:white; margin-left:10px;">Kapat</button>
    </div>

    <nav class="nav">
        <div class="logo">NEZO</div>
        <button class="search-trigger" onclick="toggleSearch()">🔍</button>
    </nav>

    <div class="wrapper">
        <div id="player-panel">
            <h2 id="cur-title" style="margin: 0 0 15px 0; color: var(--accent); font-size: 18px;">Video Seçin</h2>
            <div class="video-box">
                <iframe id="nezo-frame" allowfullscreen src=""></iframe>
            </div>
            <div id="s-tabs" class="tabs"></div>
            <div id="e-grid" class="ep-grid"></div>
        </div>

        <div class="title">TRENDLER</div>
        <div id="main-grid" class="grid"></div>
    </div>

    <script>
        // LİNK VERİTABANI
        const episodeLinks = {
            "bl_s2_e1": "https://animecix.tv/titles/82/bleach/season/2/episode/1"
        };

        const seriesDb = [
            { id: 'bl', t: 'Bleach', img: 'https://www.themoviedb.org/t/p/w600_and_h900_bestv2/367Tf0G5XJvV8M2K2M6fK6fG6fG.jpg', seasons: [366, 26] },
            { id: 'pb', t: 'Prison Break', img: 'https://www.themoviedb.org/t/p/w600_and_h900_bestv2/u9Y6G5f9B5T7H0o8Xo0lY7oX6nS.jpg', seasons: [22, 22, 22] }
        ];

        function init() {
            const grid = document.getElementById('main-grid');
            seriesDb.forEach(s => {
                grid.innerHTML += `
                    <div class="card" onclick="openShow('${s.id}')" data-name="${s.t.toLowerCase()}">
                        <img src="${s.img}">
                        <div class="card-name">${s.t}</div>
                    </div>`;
            });
        }

        function openShow(id) {
            const item = seriesDb.find(x => x.id === id);
            document.getElementById('player-panel').style.display = 'block';
            document.getElementById('cur-title').innerText = item.t;
            
            const tabs = document.getElementById('s-tabs');
            tabs.innerHTML = '';
            item.seasons.forEach((count, i) => {
                tabs.innerHTML += `<button class="tab-btn" onclick="loadEps('${id}', ${i})">Sezon ${i+1}</button>`;
            });
            loadEps(id, 0);
            window.scrollTo({top: 80, behavior: 'smooth'});
        }

        function loadEps(id, sIdx) {
            const item = seriesDb.find(x => x.id === id);
            const grid = document.getElementById('e-grid');
            grid.innerHTML = '';
            for(let i=1; i<=item.seasons[sIdx]; i++) {
                grid.innerHTML += `<button class="ep-btn" onclick="watch('${id}', ${sIdx+1}, ${i})">Bölüm ${i}</button>`;
            }
        }

        function watch(id, s, e) {
            const frame = document.getElementById('nezo-frame');
            const key = `${id}_s${s}_e${e}`;
            document.getElementById('cur-title').innerText = `Oynatılıyor: Sezon ${s} Bölüm ${e}`;
            
            if(episodeLinks[key]) {
                frame.src = episodeLinks[key];
            } else {
                alert("Bu bölümün linki henüz eklenmedi. Lütfen bana gönder!");
                frame.src = "about:blank";
            }
        }

        function toggleSearch() {
            const box = document.getElementById('search-overlay');
            box.style.display = (box.style.display === 'flex') ? 'none' : 'flex';
        }

        function doSearch() {
            const val = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.card').forEach(c => {
                c.style.display = c.dataset.name.includes(val) ? "block" : "none";
            });
        }

        window.onload = init;
    </script>
</body>
</html>
