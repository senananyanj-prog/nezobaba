<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nezo Baba | Film ve Dizi</title>
    <style>
        body { background-color: #141414; color: white; font-family: 'Arial', sans-serif; margin: 0; opacity: 0; animation: fadeIn 1.5s forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        header { padding: 20px 5%; background: rgba(0,0,0,0.9); display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e50914; }
        .logo { color: #e50914; font-size: 24px; font-weight: bold; letter-spacing: 2px; }
        .container { padding: 40px 5%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 25px; }
        .card { background: #1f1f1f; border-radius: 8px; overflow: hidden; transition: 0.3s; }
        .card:hover { transform: scale(1.05); }
        .card img { width: 100%; height: 300px; object-fit: cover; }
        .p-10 { padding: 15px; }
        .btn { background: #e50914; color: white; border: none; padding: 10px; width: 100%; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <header><div class="logo">NEZO BABA</div></header>
    <div class="container">
        <h2 style="border-left: 4px solid #e50914; padding-left: 10px;">Popüler İçerikler</h2>
        <div class="grid">
            <div class="card">
                <img src="https://image.tmdb.org/t/p/w500/9gk7Fn9sVAsS9696G1o3oIx9YvA.jpg">
                <div class="p-10"><div>Inception</div><button class="btn">İzle</button></div>
            </div>
            <div class="card">
                <img src="https://image.tmdb.org/t/p/w500/ggFHUX9ygvsY7Y0ulWvC9O90Iqc.jpg">
                <div class="p-10"><div>Breaking Bad</div><button class="btn">İzle</button></div>
            </div>
            <div class="card">
                <img src="https://image.tmdb.org/t/p/w500/qJ2tW6WMUDp9QEQVvCjGXmHqhiG.jpg">
                <div class="p-10"><div>The Dark Knight</div><button class="btn">İzle</button></div>
            </div>
        </div>
    </div>
</body>
</html>
