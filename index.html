<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEZO BABA</title>
    <style>
        body { background:#000; color:#fff; font-family:Arial; margin:0; padding:0; }
        header { padding:20px; background:#141414; border-bottom:3px solid #e50914; display:flex; justify-content:space-between; align-items:center; }
        .logo { color:#e50914; font-size:30px; font-weight:bold; }
        .search { padding:8px; border-radius:5px; border:none; width:200px; }
        .container { padding:20px; }
        .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(150px, 1fr)); gap:15px; }
        .card { background:#1f1f1f; border-radius:5px; overflow:hidden; text-align:center; padding-bottom:10px; }
        .card img { width:100%; height:220px; object-fit:cover; }
        .card h3 { font-size:14px; margin:10px 0; }
        .btn { background:#e50914; color:#fff; border:none; padding:8px; width:90%; border-radius:3px; cursor:pointer; }
        /* Oynatıcı Paneli */
        .player { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:100; flex-direction:column; align-items:center; justify-content:center; }
    </style>
</head>
<body>

<header>
    <div class="logo">NEZO BABA</div>
    <input type="text" class="search" placeholder="Ara...">
</header>

<div class="container">
    <h2>Diziler & Animeler</h2>
    <div class="grid">
        <div class="card" onclick="alert('Bölümler: 1.Sezon, 2.Sezon...')">
            <img src="https://www.themoviedb.org/t/p/w600_and_h900_bestv2/ggFHUX9ygvsY7Y0ulWvC9O90Iqc.jpg">
            <h3>Breaking Bad</h3>
            <button class="btn">İzle</button>
        </div>
        <div class="card" onclick="alert('Sezonlar Yükleniyor...')">
            <img src="https://www.themoviedb.org/t/p/w600_and_h900_bestv2/36p7vS9vSxml07CU3IDvbt9ihkM.jpg">
            <h3>Bleach</h3>
            <button class="btn">İzle</button>
        </div>
    </div>
</div>

</body>
</html>
