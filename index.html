<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEZO | Premium Universe</title>
    <style>
        :root { --accent: #00f2ff; --red: #ff0055; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 50px; overflow-x: hidden; }

        /* NAVBAR & SEARCH */
        .nav { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background: rgba(0,0,0,0.95); position: fixed; top: 0; width: 100%; z-index: 1000; box-sizing: border-box; border-bottom: 1px solid var(--accent); }
        .logo { font-size: 24px; font-weight: bold; color: var(--red); text-shadow: 0 0 10px var(--red); }
        .search-trigger { font-size: 20px; cursor: pointer; color: white; background: none; border: none; }

        #search-box { position: fixed; top: 0; left: 0; width: 100%; height: 60px; background: #000; z-index: 1001; display: none; align-items: center; padding: 0 15px; box-sizing: border-box; border-bottom: 2px solid var(--accent); }
        #search-box input { flex: 1; background: #111; border: none; color: white; padding: 10px; border-radius: 5px; outline: none; }

        .container { margin-top: 75px; padding: 0 15px; }

        /* PLAYER */
        #player-panel { display: none; background: #111; border-radius: 12px; padding: 10px; border: 1px solid rgba(0,242,255,0.2); margin-bottom: 25px; }
        .video-box { position: relative; width: 100%; padding-bottom: 56.25%; height: 0; border-radius: 8px; overflow: hidden; background: #000; }
        .video-box iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        /* SEZON & BÖLÜM SEÇİCİ */
        .tabs { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; }
        .tab-btn { background: #222; border: 1px solid #444; color: white; padding: 8px 18px; border-radius: 6px; white-space: nowrap; cursor: pointer; }
        .tab-btn.active { background: var(--accent); color: black; font-weight: bold; }
        
        .ep-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-top: 10px; max-height: 300px; overflow-y: auto; padding: 5px; }
        .ep-btn { background: #333; border: none; color: white; padding: 10px; border-radius: 5px; font-size: 11px; cursor: pointer; }
        .ep-btn:hover { background: var(--red); }

        /* KATALOG */
        .title { font-size: 20px; margin: 25px 0 15px; border-left: 4px solid var(--red); padding-left: 10px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .card { background: #111; border-radius: 10px; overflow: hidden; border: 1px solid #222; cursor: pointer; }
        .card img { width: 100%; height: 230px; object-fit: cover; }
        .card-name { padding: 10px; text-align: center; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="search-box">
        <input type="text" id="searchInput" placeholder="Dizi/Film ara..." onkeyup="search()">
        <button onclick="toggleSearch()" style="color:white; margin-left:10px; background:none; border:none;">(X)</button>
    </div>

    <nav class="nav">
        <div class="logo">NEZO</div>
        <button class="search-trigger" onclick="toggleSearch()">🔍</button>
    </nav>

    <div class="container">
        <div id="player-panel">
            <h3 id="p-title" style="margin: 0 0 10px 0; color: var(--accent); font-size: 16px;">Yükleniyor...</h3>
            <div class="video-box">
                <iframe id="main-frame" allowfullscreen src=""></iframe>
            </div>
            <div id="s-tabs" class="tabs"></div>
            <div id="e-grid" class="ep-grid"></div>
        </div>

        <div class="title">Trendler</div>
        <div id="main-grid" class="grid"></div>
    </div>

    <script>
        // LİNKLERİNİ BURAYA EKLE
        const links = {
            "bl_s2_e1": "https://animecix.tv/titles/82/bleach/season/2/episode/1"
        };

        const db = [
            { 
                id: 'bl', 
                t: 'Bleach', 
                img: 'https://image.tmdb.org/t/p/w600_and_h900_bestv2/367Tf0G5XJvV8M2K2M6fK6fG6fG.jpg', 
                seasons: [366, 26] // Sezon 1: 366 Bölüm, Sezon 2: 26 Bölüm (TYBW)
            },
            { 
                id: 'pb', 
                t: 'Prison Break', 
                img: 'https://image.tmdb.org/t/p/w600_and_h900_bestv2/u9Y6G5f9B5T7H0o8Xo0lY7oX6nS.jpg', 
                seasons: [22, 22, 22, 24, 9] 
            }
        ];

        function init() {
            const grid = document.getElementById('main-grid');
            db.forEach(m => {
                grid.innerHTML += `<div class="card" onclick="openShow('${m.id}')" data-name="${m.t.toLowerCase()}"><img src="${m.img}"><div class="card-name">${m.t}</div></div>`;
            });
        }

        function openShow(id) {
            const item = db.find(x => x.id === id);
            document.getElementById('player-panel').style.display = 'block';
            const tabs = document.getElementById('s-tabs');
            tabs.innerHTML = '';
            item.seasons.forEach((_, i) => {
                tabs.innerHTML += `<button class="tab-btn" onclick="loadEps('${id}', ${i})">Sezon ${i+1}</button>`;
            });
            loadEps(id, 0);
            window.scrollTo({top: 80, behavior: 'smooth'});
        }

        function loadEps(id, sIdx) {
            document.querySelectorAll('.tab-btn').forEach((b, i) => {
                if(i === sIdx) b.classList.add('active'); else b.classList.remove('active');
            });
            const item = db.find(x => x.id === id);
            const grid = document.getElementById('e-grid');
            grid.innerHTML = '';
            for(let i=1; i<=item.seasons[sIdx]; i++) {
                grid.innerHTML += `<button class="ep-btn" onclick="play('${id}', ${sIdx+1}, ${i})">Bölüm ${i}</button>`;
            }
        }

        function play(id, s, e) {
            const frame = document.getElementById('main-frame');
            const key = `${id}_s${s}_e${e}`;
            const item = db.find(x => x.id === id);
            document.getElementById('p-title').innerText = `${item.t} - Sezon ${s} Bölüm ${e}`;
            
            if(links[key]) {
                frame.src = links[key];
            } else {
                frame.src = "";
                alert("Bu bölümün linki henüz eklenmedi. Linki gönderirsen hemen eklerim!");
            }
        }

        function toggleSearch() {
            const box = document.getElementById('search-box');
            box.style.display = (box.style.display === 'flex') ? 'none' : 'flex';
        }

        function search() {
            const val = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.card').forEach(c => {
                c.style.display = c.dataset.name.includes(val) ? "block" : "none";
            });
        }

        window.onload = init;
    </script>
</body>
</html>
