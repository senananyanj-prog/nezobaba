<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEZO | Premium Universe</title>
    <style>
        :root { --accent: #00f2ff; --red: #ff0055; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 50px; }
        
        /* ÖZGÜN INTRO */
        #nezo-intro { position: fixed; inset: 0; background: #000; z-index: 5000; display: flex; align-items: center; justify-content: center; transition: 1s; }
        .intro-text { font-size: 50px; font-weight: 900; color: var(--red); letter-spacing: 10px; animation: glitch 2s infinite; }
        @keyframes glitch { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(1.1); } 100% { opacity: 1; transform: scale(1); } }

        /* NAVBAR */
        .nav { display: flex; justify-content: space-between; padding: 15px 20px; background: rgba(0,0,0,0.95); position: fixed; top:0; width:100%; z-index:1000; box-sizing: border-box; border-bottom: 1px solid var(--accent); }
        .logo { font-size: 26px; font-weight: bold; color: var(--red); text-shadow: 0 0 10px var(--red); }

        .main { margin-top: 80px; padding: 15px; }

        /* PLAYER & BÖLÜMLER */
        #player-panel { display: none; background: #111; border-radius: 15px; padding: 15px; border: 1px solid var(--accent); margin-bottom: 30px; }
        video { width: 100%; border-radius: 10px; box-shadow: 0 0 20px rgba(0,242,255,0.2); }
        
        .selector { margin-top: 20px; }
        .tabs { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; }
        .tab-btn { background: #222; border: 1px solid var(--accent); color: white; padding: 8px 15px; border-radius: 5px; white-space: nowrap; cursor: pointer; }
        .tab-btn.active { background: var(--accent); color: black; font-weight: bold; }
        
        .ep-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 15px; }
        .ep-btn { background: #333; border: none; color: white; padding: 10px; border-radius: 5px; font-size: 12px; cursor: pointer; }
        .ep-btn:hover { background: var(--red); }

        /* KATALOG */
        .shelf-title { font-size: 22px; margin: 25px 0 15px; display: flex; align-items: center; }
        .shelf-title::before { content: ""; width: 5px; height: 25px; background: var(--red); margin-right: 15px; border-radius: 5px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }

        .card { background: #111; border-radius: 12px; overflow: hidden; position: relative; cursor: pointer; border: 1px solid #222; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .card img { width: 100%; height: 240px; object-fit: cover; background: #222; }
        .card-title { padding: 10px; font-weight: bold; text-align: center; font-size: 14px; }
    </style>
</head>
<body>

<div id="nezo-intro"><div class="intro-text">NEZO</div></div>

<nav class="nav">
    <div class="logo">NEZO</div>
    <div style="color: var(--accent); font-size: 10px; letter-spacing: 2px;">PREMIUM UNIVERSE</div>
</nav>

<div class="main">
    <div id="player-panel">
        <h2 id="display-title" style="margin-top:0; color: var(--accent); font-size: 20px;"></h2>
        <video id="video-player" controls poster="https://i.ibb.co/6P2CkzN/loading.gif"></video>
        
        <div class="selector">
            <div id="season-tabs" class="tabs"></div>
            <div id="episode-list" class="ep-grid"></div>
        </div>
    </div>

    <div class="shelf-title">Trendler</div>
    <div class="grid" id="popular-shelf"></div>

    <div class="shelf-title">Karanlık Oda (Korku)</div>
    <div class="grid" id="horror-shelf"></div>
</div>

<script>
    // TÜM VERİLER VE GERÇEK BÖLÜM SAYILARI
    const database = [
        { id: 'pb', cat: 'pop', title: 'Prison Break', img: 'https://www.themoviedb.org/t/p/w600_and_h900_bestv2/u9Y6G5f9B5T7H0o8Xo0lY7oX6nS.jpg', seasons: [22, 22, 22, 24, 9] },
        { id: 'bl', cat: 'pop', title: 'Bleach', img: 'https://www.themoviedb.org/t/p/w600_and_h900_bestv2/367Tf0G5XJvV8M2K2M6fK6fG6fG.jpg', seasons: [20, 21, 22, 28, 21, 22, 20, 16, 21, 16, 20, 20, 26, 20, 26, 24] },
        { id: 'bb', cat: 'pop', title: 'Breaking Bad', img: 'https://www.themoviedb.org/t/p/w600_and_h900_bestv2/ztY5UiswzG8uVjP4uKk3UjA0fF1.jpg', seasons: [7, 13, 13, 13, 16] },
        { id: 'cj', cat: 'hor', title: 'The Conjuring', img: 'https://www.themoviedb.org/t/p/w600_and_h900_bestv2/wS4kH5G0VzD6iE1T9U0p6S5mF7G.jpg', seasons: [1] },
        { id: 'it', cat: 'hor', title: 'IT (O)', img: 'https://www.themoviedb.org/t/p/w600_and_h900_bestv2/9E2D8hM52O2Z7r1t9H1E7k2N4p9.jpg', seasons: [1] }
    ];

    function startApp() {
        const pop = document.getElementById('popular-shelf');
        const hor = document.getElementById('horror-shelf');
        
        database.forEach(m => {
            const html = `
                <div class="card" onclick="openMedia('${m.id}')">
                    <img src="${m.img}" onerror="this.src='https://via.placeholder.com/300x450/111/ff0055?text=${m.title}'">
                    <div class="card-title">${m.title}</div>
                </div>`;
            if(m.cat === 'pop') pop.innerHTML += html;
            else hor.innerHTML += html;
        });

        setTimeout(() => document.getElementById('nezo-intro').style.display = 'none', 2500);
    }

    function openMedia(id) {
        const item = database.find(x => x.id === id);
        const panel = document.getElementById('player-panel');
        panel.style.display = 'block';
        document.getElementById('display-title').innerText = item.title;
        
        // Sezonları oluştur
        const sTabs = document.getElementById('season-tabs');
        sTabs.innerHTML = '';
        item.seasons.forEach((epCount, index) => {
            const sNum = index + 1;
            sTabs.innerHTML += `<button class="tab-btn" onclick="loadEpisodes('${item.id}', ${index})">Sezon ${sNum}</button>`;
        });
        
        loadEpisodes(id, 0); // Varsayılan Sezon 1
        window.scrollTo({top: 80, behavior: 'smooth'});
    }

    function loadEpisodes(id, sIdx) {
        const item = database.find(x => x.id === id);
        const epList = document.getElementById('episode-list');
        epList.innerHTML = '';
        
        const epCount = item.seasons[sIdx];
        for(let i=1; i<=epCount; i++) {
            epList.innerHTML += `<button class="ep-btn" onclick="playVideo('${item.title}', ${sIdx+1}, ${i})">Bölüm ${i}</button>`;
        }
    }

    function playVideo(title, s, e) {
        const video = document.getElementById('video-player');
        // BURAYA GERÇEK VİDEO LİNKİNİ KOYMAN LAZIM
        // Eğer GitHub'a video yüklersen: video.src = "videolar/" + title + "_S" + s + "_B" + e + ".mp4";
        video.src = "https://www.w3schools.com/html/movie.mp4"; // Test videosu
        document.getElementById('display-title').innerText = `${title} - Sezon ${s} Bölüm ${e}`;
        video.play();
    }

    window.onload = startApp;
</script>
</body>
</html>
