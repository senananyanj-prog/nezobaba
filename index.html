<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bleach İzleme Paneli</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: #1a1a1a;
            width: 90%;
            max-width: 500px;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h2 { margin-bottom: 5px; font-size: 24px; }
        .status { color: #ccc; margin-bottom: 20px; font-size: 14px; }

        /* Video Alanı */
        #video-container {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 1px solid #333;
        }

        video { width: 100%; height: 100%; display: none; }

        /* Buton Izgarası */
        .episode-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .ep-btn {
            background-color: #333;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
        }

        .ep-btn:hover { background-color: #444; }
        .ep-btn.active { background-color: #e50914; } /* Netflix kırmızısı gibi */

    </style>
</head>
<body>

<div class="container">
    <h2 id="current-title">Bleach</h2>
    <p class="status" id="status-text">Lütfen bir bölüm seçin...</p>

    <div id="video-container">
        <p id="placeholder">Oynatmak için aşağıdan seçin</p>
        <video id="main-player" controls>
            <source src="" type="video/mp4">
        </video>
    </div>

    <div class="episode-grid">
        <button class="ep-btn" onclick="playVideo(this, '1. Bölüm', 'video_url_1.mp4')">1. Sezon 1. Bölüm</button>
        <button class="ep-btn" onclick="playVideo(this, '2. Bölüm', 'video_url_2.mp4')">1. Sezon 2. Bölüm</button>
        <button class="ep-btn" onclick="playVideo(this, '3. Bölüm', 'video_url_3.mp4')">1. Sezon 3. Bölüm</button>
        <button class="ep-btn" onclick="playVideo(this, '4. Bölüm', 'video_url_4.mp4')">1. Sezon 4. Bölüm</button>
    </div>
</div>

<script>
    function playVideo(btn, title, url) {
        const video = document.getElementById('main-player');
        const placeholder = document.getElementById('placeholder');
        const statusText = document.getElementById('status-text');

        // Buton renklerini sıfırla ve seçileni aktif yap
        document.querySelectorAll('.ep-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        // Video kaynağını değiştir
        video.style.display = 'block';
        placeholder.style.display = 'none';
        
        // ÖNEMLİ: Gerçek bir video linki (URL) koyman lazım
        video.src = url;
