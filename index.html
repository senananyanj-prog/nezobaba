<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEZO BABA | Profesyonel Dizi & Anime İzleme Platformu</title>
    <style>
        :root {
            --netflix-red: #e50914;
            --bg-color: #141414;
            --card-bg: #1f1f1f;
            --text-main: #ffffff;
            --text-sub: #a3a3a3;
            --transition: 0.4s ease;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Navigasyon ve Logo */
        header {
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 100%);
            padding: 20px 4%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            box-sizing: border-box;
        }

        .logo {
            color: var(--netflix-red);
            font-size: 30px;
            font-weight: 900;
            letter-spacing: -1px;
            text-transform: uppercase;
            cursor: pointer;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .nav-links {
            display: flex;
            gap: 20px;
            margin-left: 30px;
            flex-grow: 1;
        }

        .nav-links a {
            color: var(--text-main);
            text-decoration: none;
            font-size: 14px;
            transition: var(--transition);
        }

        .nav-links a:hover { color: var(--text-sub); }

        /* Arama Kutusu */
        .search-box {
            background: rgba(0,0,0,0.5);
            border: 1px solid #444;
            color: white;
            padding: 8px 15px;
            border-radius: 4px;
            outline: none;
        }

        /* Ana İçerik */
        .hero {
            height: 70vh;
            background: linear-gradient(to bottom, transparent, var(--bg-color)), 
                        url('https://images.alphacoders.com/132/1328325.png');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: flex-end;
            padding: 0 4% 50px 4%;
        }

        .hero-info h1 { font-size: 3rem; margin-bottom: 10px; }
        .hero-info p { max-width: 600px; color: var(--text-sub); }

        .container { padding: 40px 4%; }
        .row-title { font-size: 20px; font-weight: bold; margin-bottom: 20px; border-left: 4px solid var(--netflix-red); padding-left: 10px; }

        /* Film/Dizi Kartları */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 4px;
            overflow: hidden;
            transition: var(--transition);
            cursor: pointer;
            position: relative;
        }

        .card:hover { transform: scale(1.08); z-index: 10; box-shadow: 0 0 20px rgba(0,0,0,0.8); }

        .card img { width: 100%; height: 300px; object-fit: cover; }
        .card-content { padding: 12px; }
        .card-title { font-size: 14px; font-weight: bold; }
        .card-meta { color: var(--netflix-red); font-size: 11px; margin-top: 5px; font-weight: bold; }

        /* Gelişmiş Player ve Bölüm Seçimi */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            z-index: 2000;
            overflow-y: auto;
            padding: 40px 0;
        }

        .modal-content {
            width: 90%; max-width: 1000px; margin: auto;
            background: #181818; border-radius: 8px; overflow: hidden;
        }

        .video-player {
            width: 100%; aspect-ratio: 16/9; background: #000;
            display: flex; align-items: center; justify-content: center;
        }

        .episode-selector {
            padding: 20px; background: #181818;
        }

        .season-tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .tab { cursor: pointer; color: var(--text-sub); padding: 5px 10px; }
        .tab.active { color: var(--netflix-red); font-weight: bold; }

        .episode-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
        .ep-item { 
            background: #2f2f2f; padding: 10px; border-radius: 4px; font-size: 12px; text-align: center; cursor: pointer; transition: 0.2s;
        }
        .ep-item:hover { background: var(--netflix-red); }

        .close-btn { position: absolute; top: 20px; right: 20px; font-size: 30px; cursor: pointer; color: white; z-index: 2100; }

    </style>
</head>
<body>

<header>
    <div class="logo">NEZO BABA</div>
    <div class="nav-links">
        <a href="#">Ana Sayfa</a>
        <a href="#">Diziler</a>
        <a href="#">Filmler</a>
        <a href="#">Animeler</a>
    </div>
    <input type="text" class="search-box" placeholder="Ara...">
</header>

<div class="hero">
    <div class="hero-info">
        <h1>Bleach: Thousand-Year Blood War</h1>
        <p>Ichigo Kurosaki, dünyayı korumak için kılıcını son kez kuşanıyor. Efsanevi anime geri döndü.</p>
    </div>
</div>

<div class="container">
    <div class="row-title">Popüler Diziler & Animeler</div>
    <div class="grid">
        <div class="card" onclick="openShow('Breaking Bad', 5)">
            <img src="https://www.themoviedb.org/t/p/w600_and_h900_bestv2/ggFHUX9ygvsY7Y0ulWvC9O90Iqc.jpg">
            <div class="card-content">
                <div class="card-title">Breaking Bad</div>
                <div class="card-meta">5 SEZON | DRAM</div>
            </div>
        </div>

        <div class="card" onclick="openShow('Bleach', 16)">
            <img src="https://www.themoviedb.org/t/p/w600_and_h900_bestv2/36p7vS9vSxml07CU3IDvbt9ihkM.jpg">
            <div class="card-content">
                <div class="card-title">Bleach</div>
                <div class="card-meta">16 SEZON | ANİME</div>
            </div>
        </div>
    </div>
</div>

<div class="modal" id="videoModal">
    <span class="close-btn" onclick="closeModal()">&times;</span>
    <div class="modal-content">
        <div class="video-player">
            <h2 id="nowPlayingText">Bölüm Seçiniz...</h2>
        </div>
        <div class="episode-selector">
            <h2 id="modalTitle">Dizi Adı</h2>
            <div class="season-tabs" id="seasonTabs">
                </div>
            <div class="episode-list" id="episodeList">
                </div>
        </div>
    </div>
</div>

<script>
    function openShow(name, seasons) {
        const modal = document.getElementById('videoModal');
        const title = document.getElementById('modalTitle');
        const tabs = document.getElementById('seasonTabs');
        
        title.innerText = name;
        tabs.innerHTML = "";
        
        for(let i=1; i<=seasons; i++) {
            tabs.innerHTML += `<div class="tab ${i===1?'active':''}" onclick="loadEpisodes(${i})">Sezon ${i}</div>`;
        }
        
        loadEpisodes(1);
        modal.style.display = "block";
        document.body.style.overflow = "hidden";
    }

    function loadEpisodes(seasonNum) {
        const list = document.getElementById('episodeList');
        list.innerHTML = "";
        // Örnek olarak her sezona 10 bölüm ekliyoruz
        for(let i=1; i<=10; i++) {
            list.innerHTML += `<div class="ep-item" onclick="playVideo(${seasonNum}, ${i})">${seasonNum}. Sezon ${i}. Bölüm</div>`;
        }
    }

    function playVideo(s, e) {
        document.getElementById('nowPlayingText').innerText = s + ". Sezon " + e + ". Bölüm Oynatılıyor...";
        // Buraya gerçek embed linkleri (iframe) gelebilir.
    }

    function closeModal() {
        document.getElementById('videoModal').style.display = "none";
        document.body.style.overflow = "auto";
    }
</script>

</body>
</html>
