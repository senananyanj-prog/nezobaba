<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEZO | Real Cinema</title>
    <style>
        :root { --accent: #00f2ff; --red: #ff0055; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; overflow-x: hidden; padding-bottom: 50px; }
        
        /* NAVBAR */
        .nav { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: rgba(0,0,0,0.9); position: fixed; top: 0; width: 100%; z-index: 1000; box-sizing: border-box; border-bottom: 1px solid var(--accent); }
        .logo { font-size: 24px; font-weight: bold; color: var(--red); text-shadow: 0 0 10px var(--red); text-decoration: none; }
        .search-btn { background: none; border: none; font-size: 20px; cursor: pointer; color: white; }

        /* SEARCH OVERLAY */
        #search-box { position: fixed; top: 0; left: 0; width: 100%; height: 60px; background: #000; z-index: 1001; display: none; align-items: center; padding: 0 15px; box-sizing: border-box; border-bottom: 2px solid var(--accent); }
        #search-box input { flex: 1; background: #111; border: none; color: white; padding: 10px; border-radius: 5px; outline: none; }

        .container { margin-top: 80px; padding: 0 15px; }

        /* PLAYER AREA */
        #player-wrap { display: none; background: #111; border-radius: 15px; padding: 10px; border: 1px solid rgba(0,242,255,0.2); margin-bottom: 25px; }
        .iframe-container { position: relative; width: 100%; padding-bottom: 56.25%; height: 0; border-radius: 10px; overflow: hidden; background: #000; }
        .iframe-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        /* SEZON & BÖLÜM BUTONLARI */
        .selector { margin-top: 15px; }
        .tabs { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; }
        .tab-btn { background: #222; border: 1px solid #444; color: white; padding: 8px 15px; border-radius: 6px; white-space: nowrap; cursor: pointer; }
        .tab-btn.active { background: var(--accent); color: #000; font-weight: bold; }
        
        .ep-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 10px; }
        @media (min-width: 500px) { .ep-grid { grid-template-columns: repeat(4, 1fr); } }
        .ep-btn { background: #333; border: none; color: white; padding: 12px; border-radius: 6px; font-size: 13px; cursor: pointer; }
        .ep-btn:hover { background: var(--red); }

        /* CARDS */
        .shelf-title { font-size: 20px; margin: 25px 0 15px; color: var(--accent); border-left: 4px solid var(--red); padding-left: 10px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .card { background: #111; border-radius: 10px; overflow: hidden; border: 1px solid #222; cursor: pointer; }
        .card img { width: 100%; height: 220px; object-fit: cover; }
        .card-name { padding: 10px; text-align: center; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="search-box">
        <input type="text" id="searchInput" placeholder="Dizi ara..." onkeyup="doSearch()">
        <button onclick="toggleSearch()" style="color:white; margin-left:10px; background:none; border:none;">Kapat</button>
    </div>

    <nav class="nav">
        <a href="#" class="logo">NEZO</a>
        <button class="search-btn" onclick="toggleSearch()">🔍</button>
    </nav>

    <div class="container">
        <div id="player-wrap">
            <h3 id="now-title" style="margin: 0 0 10px 0; color: var(--accent); font-size: 16px;">Seçim Bekleniyor...</h3>
            <div class="iframe-container">
                <iframe id="video-frame" allowfullscreen></iframe>
            </div>
            <div class="selector">
                <div id="s-tabs" class="tabs"></div>
                <div id="e-grid" class="ep-grid"></div>
            </div>
        </div>

        <div class="shelf-title">Trendler</div>
        <div id="main-grid" class="grid"></div>
    </div>

    <script>
        // BURAYA ATTIĞIN LİNKLERİ EKLEYECEĞİZ
        const videoLinks = {
            "bl_s2_e1": "https://animecix.tv/titles/82/bleach/season/2/episode/1"
        };

        const db = [
            { id: 'bl', t: 'Bleach', img: 'https://image.tmdb.org/t/p/w600_and_h900_bestv2/367Tf0G5XJvV8M2K2M6fK6fG6fG.jpg', seasons: [20, 21, 22] },
            { id: 'pb', t: 'Prison Break', img: 'https://image.tmdb.org/t/p/w600_and_h900_bestv2/u9Y6G5f9B5T7H0o8Xo0lY7oX6nS.jpg', seasons: [22, 22, 22] }
        ];

        function init() {
            const grid = document.getElementById('main-grid');
            db.forEach(m => {
                grid.innerHTML += `
                    <div class="card" onclick="openShow('${m.id}')" data-name="${m.t.toLowerCase()}">
                        <img src="${m.img}">
                        <div class="card-name">${m.t}</div>
                    </div>`;
            });
        }

        function openShow(id) {
            const item = db.find(x => x.id === id);
            document.getElementById('player-wrap').style.display = 'block';
            document.getElementById('now-title').innerText = item.t;
            
            const tabs = document.getElementById('s-tabs');
            tabs.innerHTML = '';
            item.seasons.forEach((count, i) => {
                tabs.innerHTML += `<button class="tab-btn" onclick="loadEps('${id}', ${i})">Sezon ${i+1}</button>`;
            });
            loadEps(id, 0);
            window.scrollTo({top: 80, behavior: 'smooth'});
        }

        function loadEps(id, sIdx) {
            const item = db.find(x => x.id === id);
            const grid = document.getElementById('e-grid');
            grid.innerHTML = '';
            for(let i=1; i<=item.seasons[sIdx]; i++) {
                grid.innerHTML += `<button class="ep-btn" onclick="play('${id}', ${sIdx+1}, ${i})">Bölüm ${i}</button>`;
            }
        }

        function play(id, s, e) {
            const frame = document.getElementById('video-frame');
            const key = `${id}_s${s}_e${e}`;
            const item = db.find(x => x.id === id);
            document.getElementById('now-title').innerText = `${item.t} - Sezon ${s} Bölüm ${e}`;
            
            if(videoLinks[key]) {
                frame.src = videoLinks[key];
            } else {
                alert("Bu bölümün linki henüz eklenmedi! Linki atarsan hemen eklerim.");
                frame.src = "about:blank";
            }
        }

        function toggleSearch() {
            const box = document.getElementById('search-box');
            box.style.display = (box.style.display === 'flex') ? 'none' : 'flex';
        }

        function doSearch() {
            const val = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.card').forEach(c => {
                c.style.display = c.dataset.name.includes(val) ? "block" : "none";
            });
        }

        window.onload = init;
    </script>
</body>
</html>
